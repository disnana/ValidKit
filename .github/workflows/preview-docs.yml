name: Preview Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/gen_api_docs.py'
      - '.github/workflows/preview-docs.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate API Docs
        run: python scripts/gen_api_docs.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/site/package.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm install

      - name: Build with VitePress
        working-directory: docs/site
        run: npx vitepress build --base /preview/pr-${{ github.event.number }}/

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site/.vitepress/dist
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "docs: deploy preview for PR #${{ github.event.number }} [skip ci]"

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://validkit.disnana.com/preview/pr-${prNumber}/`;
            const body = [
              '## 📖 ドキュメントプレビュー / Documentation Preview',
              '',
              'このPRのドキュメントプレビューが利用可能です:',
              '',
              `🔗 **${previewUrl}**`,
              '',
              '> プッシュのたびに自動更新されます。',
              '> This preview is automatically updated on each push to this PR.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('ドキュメントプレビュー')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
